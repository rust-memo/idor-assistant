  name: Build and Release IDOR Assistant

  on:
    push:
      branches:
        - main
      tags:
        - "v*"
    pull_request:
      branches:
        - main
    workflow_dispatch:

  permissions:
    contents: read

  jobs:
    test:
      name: Test on ${{ matrix.os }}
      runs-on: ${{ matrix.os }}

      strategy:
        fail-fast: false
        matrix:
          os:
            - ubuntu-latest
            - windows-latest
            - macos-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Set up Java 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: "17"
            cache: gradle

        - name: Build and test on Linux or macOS
          if: runner.os != 'Windows'
          run: |
            chmod +x ./gradlew
            ./gradlew clean test jar --no-daemon

        - name: Build and test on Windows
          if: runner.os == 'Windows'
          run: |
            .\gradlew.bat clean test jar --no-daemon

        - name: Upload tested JAR
          if: runner.os == 'Linux'
          uses: actions/upload-artifact@v7
          with:
            path: build/libs/idor-bola-assistant-2.0.0.jar
            archive: false

    release:
      name: Create GitHub Release
      needs:
        - test

      if: startsWith(github.ref, 'refs/tags/v')
      runs-on: ubuntu-latest

      permissions:
        contents: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Set up Java 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: "17"
            cache: gradle

        - name: Validate version and build release
          run: |
            chmod +x ./gradlew

            PROJECT_VERSION=$(./gradlew properties --no-daemon -q | sed -n 's/
            ^version: //p' | head -n 1)

            if [ "${GITHUB_REF_NAME}" != "v${PROJECT_VERSION}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match project version
              ${PROJECT_VERSION}"
              exit 1
            fi

            ./gradlew clean test jar --no-daemon

        - name: Generate SHA-256 checksum
          run: |
            cd build/libs
            sha256sum idor-bola-assistant-2.0.0.jar > idor-bola-assistant-
            2.0.0.jar.sha256

        - name: Publish GitHub Release
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            gh release create "${GITHUB_REF_NAME}" \
              build/libs/idor-bola-assistant-2.0.0.jar \
              build/libs/idor-bola-assistant-2.0.0.jar.sha256 \
              --verify-tag \
              --generate-notes \
              --title "IDOR/BOLA Assistant ${GITHUB_REF_NAME}"

