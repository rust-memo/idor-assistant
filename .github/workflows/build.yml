name: Build extension

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Test and package
        shell: bash
        run: ./gradlew clean test jar --no-daemon
      - name: Upload Burp extension JAR
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: build/libs/idor-bola-assistant-2.0.0.jar
