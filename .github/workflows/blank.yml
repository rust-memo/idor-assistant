name: Build IDOR Assistant

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]
    workflow_dispatch:

  permissions:
    contents: read

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v6

        - name: Set up Java 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '17'
            cache: gradle

        - name: Build and test
          run: |
            chmod +x ./gradlew
            ./gradlew clean test jar --no-daemon

        - name: Upload Burp extension JAR
          uses: actions/upload-artifact@v7
          with:
            path: build/libs/idor-bola-assistant-2.0.0.jar
            archive: false
